slug: swiss-company-data
name: Swiss Company Data
description: >-
  Look up Swiss company data from the Zefix PublicREST API (Federal Office of Justice). Accepts UID
  (e.g. CHE-105.805.977), EHRAID, or fuzzy company name.
category: data-extraction
price_cents: 80
is_free_tier: false
input_schema:
  type: object
  required:
    - uid
  properties:
    uid:
      type: string
      description: Swiss UID (e.g. CHE-105.805.977), EHRAID, or company name
output_schema:
  type: object
  example:
    company_name: Nestlé SA
    uid: CHE105805977
    ehraid: 218570
    ch_id: null
    legal_form: Association
    status: ACTIVE
    canton: VD
    municipality: Vevey
    address: "Avenue Nestlé 55, 1800 Vevey"
    purpose: null
    registration_date: null
    data_source: "Zefix, Federal Office of Justice, Switzerland"
    data_source_url: "https://www.zefix.admin.ch/"
    data_attribution: "Data from Zefix, Federal Office of Justice, Switzerland"
  properties:
    vat_number:
      type:
        - string
        - "null"
    company_name:
      type: string
    uid:
      type: string
    ehraid:
      type: integer
    ch_id:
      type: integer
    legal_form:
      type: string
    status:
      type: string
    canton:
      type: string
    municipality:
      type: string
    address:
      type: string
    purpose:
      type: string
    registration_date:
      type: string
    deletion_date:
      type: string
    data_source:
      type: string
    data_source_url:
      type: string
    data_attribution:
      type: string
data_source: Zefix PublicREST API (Federal Office of Justice, Switzerland)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: scraping-stable-target
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - name
  - address
  - professional
geography: eu
test_fixtures:
  known_answer:
    input:
      uid: CHE-105.805.977
    expected_fields:
      - field: company_name
        operator: not_null
        reliability: guaranteed
      - field: uid
        operator: not_null
        reliability: guaranteed
      - field: status
        operator: not_null
        reliability: guaranteed
      - field: data_attribution
        operator: not_null
        reliability: guaranteed
  health_check_input:
    uid: CHE-105.805.977
output_field_reliability:
  company_name: guaranteed
  uid: guaranteed
  ehraid: guaranteed
  ch_id: common
  legal_form: guaranteed
  status: guaranteed
  canton: common
  municipality: common
  address: common
  purpose: rare
  registration_date: common
  deletion_date: rare
  data_source: guaranteed
  data_source_url: guaranteed
  data_attribution: guaranteed
limitations:
  - title: Financial data not available
    text: >-
      The Zefix API provides registry data only. Detailed financial statements and annual reports
      are not publicly available through this API.
    category: coverage
    severity: info
    workaround: Use the UID from the response to order a certified extract from the cantonal Handelsregisteramt
  - title: Purpose field may be absent
    text: >-
      The company purpose (Zweck) is not always included in API responses, particularly for
      older registrations.
    category: coverage
    severity: info
  - title: Address limited to registered office
    text: >-
      Only the registered office (Sitz) address is returned. Branch office addresses require
      separate lookups.
    category: coverage
    severity: info
