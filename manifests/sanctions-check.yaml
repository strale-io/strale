slug: sanctions-check
name: Sanctions Check
description: >-
  Check if a person or entity is on sanctions lists (EU, US OFAC, UN, UK OFSI, Swiss SECO, BIS, World
  Bank, EBRD, ADB + 125 national lists). Uses Dilisense consolidated database. Returns audit-grade
  evidence: match results with classification, named source attribution, and country attribution.
category: compliance
price_cents: 20
is_free_tier: false
input_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Person or company name to check
    country:
      type: string
      description: ISO country code filter (optional)
    entity_type:
      type: string
      enum:
        - person
        - company
      description: Override auto-detection of entity type (optional)
    birth_date:
      type: string
      format: date
      description: ISO date of birth (YYYY-MM-DD) for person disambiguation, reduces false positives on common names (optional)
output_schema:
  type: object
  example:
    query: Vladimir Putin
    schema: Person
    country_filter: null
    birth_date_filter: "1952-10-07"
    is_sanctioned: true
    match_count: 14
    total_results: 14
    matches:
      - name: Vladimir Vladimirovich Putin
        entity_id: us_ofac_sdn
        classification: primary_sanction
        topics:
          - sanction
        datasets:
          - us_ofac_sdn
        countries:
          - ru
        sanction_details: ["Executive Order 14024"]
        last_updated_at: null
    lists_queried:
      collection: dilisense/consolidated-sanctions
      source_count: 134
      major_lists:
        - "OFAC — Specially Designated Nationals (SDN)"
        - "European Commission — Consolidated List of Financial Sanctions"
        - "UN Security Council — Consolidated List"
        - "HMT OFSI — Financial Sanctions"
        - "SECO — Switzerland Sanctions"
        - "BIS — Entity List"
        - "(plus ~128 more)"
      freshness_note: "Dilisense aggregates 130+ sanctions, debarment, and restrictive-measure lists into a consolidated index. The publisher refreshes the consolidated index multiple times daily; per-list timestamps are not exposed via the screening API."
      source_catalog_url: "https://dilisense.com/en/sources/sanction-sources"
      version: null
      last_updated_at: null
    source: dilisense
    queried_at: "2026-04-27T13:00:00.000Z"
  properties:
    query:
      type: string
    schema:
      type: string
      enum:
        - Person
        - Company
    country_filter:
      type:
        - string
        - "null"
    birth_date_filter:
      type:
        - string
        - "null"
    is_sanctioned:
      type: boolean
    match_count:
      type: integer
    total_results:
      type: integer
    matches:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          entity_id:
            type: string
          classification:
            type: string
            enum:
              - primary_sanction
          topics:
            type: array
          datasets:
            type: array
          countries:
            type: array
          sanction_details:
            type: array
          last_updated_at:
            type:
              - string
              - "null"
    lists_queried:
      type: object
      properties:
        collection:
          type: string
        source_count:
          type: integer
        major_lists:
          type: array
        freshness_note:
          type: string
        source_catalog_url:
          type: string
        version:
          type:
            - string
            - "null"
        last_updated_at:
          type:
            - string
            - "null"
    source:
      type: string
      enum:
        - dilisense
    queried_at:
      type: string
data_source: Dilisense consolidated (OFAC SDN, EU FSF, UN SC, UK OFSI, CH SECO, BIS, World Bank, EBRD, ADB + 125 national sanctions/debarment lists; full attribution at https://dilisense.com/en/sources/sanction-sources)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: commercial-stable-api
processes_personal_data: true
personal_data_categories:
  - name
  - date_of_birth
  - nationality
geography: global
test_fixtures:
  known_answer:
    input:
      name: Spotify AB
    expected_fields:
      - field: is_sanctioned
        operator: not_null
        reliability: guaranteed
      - field: lists_queried
        operator: not_null
        reliability: guaranteed
      # NOTE: No is_false assertion — fuzzy matching can return false positives for common names.
  health_check_input:
    name: Google
    country: US
output_field_reliability:
  query: guaranteed
  schema: guaranteed
  is_sanctioned: guaranteed
  match_count: guaranteed
  total_results: guaranteed
  matches: guaranteed
  lists_queried: guaranteed
  source: guaranteed
  queried_at: guaranteed
  country_filter: common
  birth_date_filter: common
limitations:
  - title: Per-list version timestamps are not exposed by the upstream API
    text: >-
      Dilisense refreshes the consolidated index multiple times daily, but the screening API does not return
      a per-list last_updated_at value per call. Output sets lists_queried.last_updated_at = null with a
      freshness_note attesting to the publisher's refresh cadence and a source_catalog_url for verification.
    category: freshness
    severity: info
    workaround: For same-day compliance against fresh designations, cross-reference primary sources (OFAC RSS, EU OJ).
  - title: Fuzzy name matching can produce false positives for common names
    text: >-
      Common names (e.g. "Mohammad", "John Smith") may produce false-positive matches. Use birth_date for
      person disambiguation.
    category: accuracy
    severity: warning
    workaround: Provide birth_date for individuals and an ISO country code for companies.
