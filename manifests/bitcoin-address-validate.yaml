slug: bitcoin-address-validate
name: Bitcoin Address Validation
description: >-
  Validate a Bitcoin address. Detects address type (P2PKH, P2SH, P2WPKH, P2WSH, P2TR) and network (mainnet, testnet,
  regtest). Verifies Base58Check or BIP173/BIP350 bech32/bech32m checksum to catch typos. Pure algorithmic — fast and
  cheap, no on-chain lookup.
category: validation
price_cents: 5
is_free_tier: true
input_schema:
  type: object
  required:
    - address
  properties:
    address:
      type: string
      description: >-
        Bitcoin address (e.g. 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa, bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq, or
        bc1pmfr3p9j00pfxjh0zmgp99y8zftmd3s5pmedqhyptwy6lm87hf5sspknck9)
output_schema:
  type: object
  example:
    input: bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq
    valid: true
    format_valid: true
    checksum_valid: true
    address_type: p2wpkh
    network: mainnet
    normalized: bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq
  properties:
    input:
      type: string
    valid:
      type: boolean
    format_valid:
      type: boolean
    checksum_valid:
      type: boolean
    address_type:
      type:
        - string
        - "null"
      enum:
        - p2pkh
        - p2sh
        - p2wpkh
        - p2wsh
        - p2tr
        - p2w-unknown
        - null
    network:
      type:
        - string
        - "null"
      enum:
        - mainnet
        - testnet
        - regtest
        - null
    normalized:
      type:
        - string
        - "null"
data_source: Algorithmic validation (Base58Check + BIP173/BIP350 bech32/bech32m)
data_source_type: computed
transparency_tag: algorithmic
freshness_category: computed
maintenance_class: pure-computation
avg_latency_ms: 20
processes_personal_data: false
geography: global
test_fixtures:
  known_answer:
    input:
      address: bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq
    expected_fields:
      - field: input
        operator: not_null
        reliability: guaranteed
      - field: valid
        operator: equals
        reliability: guaranteed
        value: true
      - field: format_valid
        operator: equals
        reliability: guaranteed
        value: true
      - field: checksum_valid
        operator: equals
        reliability: guaranteed
        value: true
      - field: address_type
        operator: equals
        reliability: guaranteed
        value: p2wpkh
      - field: network
        operator: equals
        reliability: guaranteed
        value: mainnet
      - field: normalized
        operator: not_null
        reliability: guaranteed
  health_check_input:
    address: bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq
output_field_reliability:
  input: guaranteed
  valid: guaranteed
  format_valid: guaranteed
  checksum_valid: guaranteed
  address_type: common
  network: common
  normalized: common
limitations:
  - title: Format and checksum only — no on-chain check
    text: >-
      Validates Bitcoin address format and checksum (Base58Check for legacy P2PKH/P2SH; BIP173 bech32 for SegWit v0
      P2WPKH/P2WSH; BIP350 bech32m for Taproot v1 P2TR). Does not check whether the address has a balance, has been used
      on-chain, or whether it controls any funds.
    category: coverage
    severity: info
    workaround: Use blockchain-explorer or wallet-balance-lookup-style capabilities for on-chain state.
  - title: Witness versions above 1 are accepted but not classified
    text: >-
      SegWit witness versions 2-16 are reserved for future upgrades. Addresses with these versions and valid bech32m
      checksum are returned with address_type="p2w-unknown" rather than rejected, since the address is structurally
      valid even if its purpose is unknown today.
    category: accuracy
    severity: info
  - title: Mainnet/testnet inferred from prefix only
    text: >-
      Network is inferred from the address prefix (version byte for legacy, HRP for bech32). Does not detect chain forks
      (e.g. Bitcoin Cash, Litecoin) that share Bitcoin's address shapes — those will either fail checksum (different
      prefix) or, if they happen to share the prefix, be classified as Bitcoin. Only Bitcoin mainnet/testnet/regtest are
      first-class.
    category: scope
    severity: warning
    workaround: If chain disambiguation matters, validate against the specific chain's expected prefix set before calling.
