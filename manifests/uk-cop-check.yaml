slug: uk-cop-check
name: UK Confirmation of Payee Check
description: >-
  Verify that a UK sort code + account number pair matches the account holder name registered at the responding PSP.
  Returns Pay.UK CoP match status (match / close_match / no_match / no_account / cannot_be_checked), the eSortcode raw
  cop_code (14 codes), modulus check, bank name, and the registered name when a close_match is returned. Implementation
  via eSortcode (Pay.UK CoP scheme participant).
category: compliance
price_cents: 25
is_free_tier: false
avg_latency_ms: 1500
input_schema:
  type: object
  required:
    - sort_code
    - account_number
    - account_holder_name
  properties:
    sort_code:
      type: string
      description: 6-digit UK sort code (with or without dashes).
    account_number:
      type: string
      description: 8-digit UK account number.
    account_holder_name:
      type: string
      description: >-
        Account holder name as it appears on the originating side. CoP scheme uses fuzzy match against the responding
        PSP's registered name. For personal accounts provide first + last name space- separated; do not include titles
        or honorifics.
    account_type:
      type: string
      description: Optional. "PERSONAL" or "BUSINESS" (case-insensitive). Defaults to BUSINESS.
    secondary_account_id:
      type: string
      description: Optional. Building society roll number, credit card number, or similar PSP-required disambiguator.
    test_outcome:
      type: string
      description: >-
        Optional. Pass an eSortcode CoP code (e.g. "MATCHED", "CLOSE_MATCH") to receive a deterministic test response
        that does not deduct credits. Used by the test scheduler.
output_schema:
  type: object
  example:
    match_status: match
    cop_code: MATCHED
    cop_description: The account name and account type match the name and account type provided.
    cop_advice: You can proceed with the creation of the Direct Debit Instruction.
    account_holder_name_provided: ACME WIDGETS LTD
    returned_name: null
    modulus_check_valid: true
    bank_name: HSBC UK Bank plc
    bic: null
    sort_code: "400515"
    account_number_last4: "5678"
    account_type: BUSINESS
    secondary_account_id: null
    test_outcome_used: null
    checked_at: "2026-05-04T12:00:00Z"
    data_source: Pay.UK Confirmation of Payee scheme via eSortcode
  properties:
    match_status:
      type: string
      enum:
        - match
        - close_match
        - no_match
        - no_account
        - cannot_be_checked
    cop_code:
      type:
        - string
        - "null"
    cop_description:
      type:
        - string
        - "null"
    cop_advice:
      type:
        - string
        - "null"
    account_holder_name_provided:
      type: string
    returned_name:
      type:
        - string
        - "null"
    modulus_check_valid:
      type:
        - boolean
        - "null"
    bank_name:
      type:
        - string
        - "null"
    bic:
      type:
        - string
        - "null"
    sort_code:
      type: string
    account_number_last4:
      type: string
    account_type:
      type: string
    secondary_account_id:
      type:
        - string
        - "null"
    test_outcome_used:
      type:
        - string
        - "null"
    checked_at:
      type: string
    data_source:
