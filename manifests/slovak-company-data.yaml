slug: slovak-company-data
name: Slovak Company Data
description: >-
  Look up Slovak company data from RPO (Register právnických osôb), the Slovak Statistical Office's authoritative
  legal-persons register. Returns name, address, legal form, registration details, and statutory representatives. Free,
  CC-BY 4.0.
category: company-data
price_cents: 5
is_free_tier: false
# Phase A0b cost-class: gov RPO API, CC-BY 4.0, no auth. Per-IP rate limit
# (60 req/min) is a burst limit, not a cumulative quota → free_unlimited.
# Current breakage (upstream 502/503) is orthogonal — see source_health.
cost_class: free_unlimited
quota_window: none
data_source: Register právnických osôb (ŠÚ SR / Statistical Office of the Slovak Republic), CC-BY 4.0
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: free-stable-api
marketplace_eligible: true
avg_latency_ms: 1500
input_schema:
  type: object
  required:
    - ico
  properties:
    ico:
      type: string
      description: Slovak IČO (8-digit identifier, zero-padded if shorter)
output_schema:
  type: object
  properties:
    ico:
      type: string
    company_name:
      type: string
    address:
      type: string
    legal_form:
      type: string
    legal_form_code:
      type: string
    registration_date:
      type: string
    status:
      type: string
    source_register:
      type: string
    registration_office:
      type: string
    registration_number:
      type: string
    nace_code:
      type: string
    nace_description:
      type: string
    directors:
      type: array
      items:
        type: string
    last_updated:
      type: string
    jurisdiction:
      type: string
processes_personal_data: true
personal_data_categories:
  - name
  - address
  - professional
geography: eu
