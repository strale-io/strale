      - field: company_name
        operator: not_null
        reliability: guaranteed
      - field: address
        operator: not_null
        reliability: guaranteed
      - field: legal_form
        operator: not_null
        reliability: common
      - field: legal_form_code
        operator: equals
        reliability: common
        value: "112"
      - field: registration_date
        operator: equals
        reliability: guaranteed
        value: "2006-09-13"
      - field: status
        operator: equals
        reliability: guaranteed
        value: active
      - field: source_register
        operator: not_null
        reliability: guaranteed
      - field: registration_office
        operator: not_null
        reliability: common
      - field: registration_number
        operator: equals
        reliability: common
        value: Sro/42251/B
      - field: nace_code
        operator: equals
        reliability: common
        value: "4690"
      - field: nace_description
        operator: not_null
        reliability: common
      - field: directors
