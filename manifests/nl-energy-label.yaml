limitations:
  - title: Requires EP-Online API key
    text: A free API key from RVO is required. Register at https://apikey.ep-online.nl
    category: access
    severity: info
  - title: Not all buildings have labels
    text: >-
      Energy labels are mandatory for sale/rental but older buildings may not have one registered. Coverage is estimated
      at ~60-70% of Dutch housing stock.
    category: coverage
    severity: info
