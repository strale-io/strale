slug: nl-energy-label
name: NL Energy Label
description: >-
  Look up Dutch energy performance labels (energielabel) from EP-Online REST API v5. Returns energy class (A–G), energy
  index, CO2 emissions, building details, and validity.
category: data-extraction
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  properties:
    postcode:
      type: string
      description: Dutch postcode (format 1234AB)
    huisnummer:
      type: string
      description: House number
    bag_id:
      type: string
      description: BAG verblijfsobject ID (alternative to postcode+huisnummer)
output_schema:
  type: object
  example:
    postcode: 1012JS
    huisnummer: 1
    energy_class: A
    energy_index: 1.01
    co2_emission_kg: 56.06
    energy_consumption_kwh: 970.95
    building_class: Utiliteitsbouw
    construction_year: 1914
    registration_date: "2018-03-15T14:26:04.877"
    valid_until: "2028-01-30T00:00:00"
    bag_verblijfsobject_id: "0363010003761571"
  properties:
    energy_class:
      type: string
    energy_index:
      type: number
    co2_emission_kg:
      type: number
    energy_consumption_kwh:
      type: number
    building_class:
      type: string
    construction_year:
      type: number
data_source: EP-Online (RVO)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: commercial-stable-api
