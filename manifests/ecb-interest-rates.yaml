slug: ecb-interest-rates
name: ECB Interest Rates
description: >-
  Fetch current ECB key interest rates (main refinancing, deposit facility, marginal lending) from the European Central
  Bank Statistical Data Warehouse.
category: finance
price_cents: 2
is_free_tier: false
maintenance_class: free-stable-api
input_schema:
  type: object
  properties:
    task:
      type: string
      description: Optional description (capability requires no specific input)
output_schema:
  type: object
  properties:
    main_refinancing_rate:
      type: number
    deposit_facility_rate:
      type: number
    marginal_lending_rate:
      type: number
    effective_date:
      type: string
    currency:
      type: string
    source_url:
      type: string
data_source: European Central Bank Statistical Data Warehouse (ECB SDW)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
test_fixtures:
  known_answer:
    input: {}
    expected_fields:
      - field: main_refinancing_rate
        operator: not_null
        reliability: guaranteed
      - field: deposit_facility_rate
        operator: not_null
        reliability: guaranteed
      - field: marginal_lending_rate
        operator: not_null
        reliability: guaranteed
      - field: effective_date
        operator: equals
        reliability: guaranteed
        value: "2025-06-11"
      - field: currency
        operator: equals
        reliability: guaranteed
        value: EUR
      - field: source_url
        operator: equals
        reliability: guaranteed
        value: https://data-api.ecb.europa.eu
  health_check_input: {}
output_field_reliability:
  main_refinancing_rate: guaranteed
  deposit_facility_rate: guaranteed
  marginal_lending_rate: guaranteed
  effective_date: guaranteed
  currency: guaranteed
  source_url: guaranteed
limitations:
  - title: Geo-restricted API
    text: >-
      The ECB SDW API may be unreachable from non-EU server locations. Railway US East deployment may experience
      intermittent failures.
    category: dependency
    severity: warning
  - title: Data freshness tied to ECB publication schedule
    text: >-
      Rates update only when the ECB Governing Council changes them, typically every 6 weeks. The effective_date
      reflects the last change.
    category: freshness
    severity: info
