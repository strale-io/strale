slug: risk-narrative-generate
name: Risk Narrative Generator
description: >-
  Generates a plain-language risk narrative from structured check results. Designed for non-technical users reviewing AI
  agent output. Supports KYB and invoice fraud contexts.
category: agent-tooling
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  required:
    - check_results
    - context
  properties:
    check_results:
      type: object
      description: Structured check results from upstream capabilities
    context:
      type: string
      enum:
        - kyb
        - invoice_fraud
      description: Context for the risk assessment (kyb or invoice_fraud)
output_schema:
  type: object
  example:
    risk_level: low
    risk_score: 25
    summary: 1 of 3 checks flagged an issue. The domain age is under 30 days, which warrants attention.
    flags:
      - severity: high
        finding: The company domain is only 15 days old
        recommendation: Verify the company through additional channels before proceeding
    passed_checks:
      - company exists
      - sanctions clear
    checks_performed: 3
    data_sources_consulted:
      - Claude Haiku risk assessment
    raw_checks:
      company_exists:
        pass: true
      sanctions_clear:
        pass: true
      domain_age_days:
        pass: false
        data:
          age_days: 15
  properties:
    risk_level:
      type: string
    risk_score:
      type: number
    summary:
      type: string
    flags:
      type: array
    passed_checks:
      type: array
    checks_performed:
      type: integer
    data_sources_consulted:
      type: array
    raw_checks:
      type: object
data_source: Claude Haiku (Anthropic API)
data_source_type: api
transparency_tag: ai_generated
freshness_category: computed
maintenance_class: requires-domain-expertise
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - name
  - financial
geography: global
test_fixtures:
  known_answer:
    input:
      check_results:
        company_exists:
          pass: true
      context: kyb
    expected_fields:
      - field: risk_level
        operator: not_null
        reliability: guaranteed
      - field: risk_score
        operator: not_null
        reliability: guaranteed
      - field: summary
        operator: not_null
        reliability: guaranteed
      - field: flags
        operator: not_null
        reliability: guaranteed
      - field: passed_checks
        operator: not_null
        reliability: guaranteed
      - field: checks_performed
        operator: not_null
        reliability: guaranteed
      - field: data_sources_consulted
        operator: not_null
        reliability: guaranteed
      - field: raw_checks
        operator: not_null
        reliability: guaranteed
  health_check_input:
    check_results:
      company_exists:
        pass: true
    context: kyb
output_field_reliability:
  risk_level: guaranteed
  risk_score: guaranteed
  summary: guaranteed
  flags: guaranteed
  passed_checks: guaranteed
  checks_performed: guaranteed
  data_sources_consulted: common
  raw_checks: guaranteed
limitations:
  - title: AI-generated narrative may oversimplify complex risk scenarios
    text: >-
      Risk narratives are generated by AI and may oversimplify complex scenarios. The narrative should be reviewed by a
      qualified professional for high-stakes decisions.
    category: accuracy
    severity: warning
  - title: Wording rules are enforced but not guaranteed
    text: >-
      The AI is instructed to follow specific wording rules (e.g., never say "safe to pay") but adherence is not 100%
      guaranteed. Automated wording checks are recommended.
    category: accuracy
    severity: info
  - title: Context-dependent output quality
    text: >-
      Narrative quality depends on the completeness of input check_results. Missing or incomplete check data will
      produce less useful narratives.
    category: coverage
    severity: info
