limitations:
  - title: Registry data only — no financials
    text: >-
      HVD is the EU Open Data Directive subset of Bolagsverket's data. It covers registry identity (name, legal form,
      status, address, SNI, registration date, insolvency flags) but NOT annual-report financials (revenue, profit,
      employees, equity). Financial fields were available in earlier Allabolag-backed versions of this capability but
      have been dropped; they require Bolagsverket's paid Årsredovisningsinformation API or a licensed aggregator.
    category: coverage
    severity: info
    workaround: Use a licensed credit-bureau capability (roadmap) or order an annual-report extract manually.
  - title: Lookup requires organisationsnummer (no name search)
    text: >-
      The HVD API accepts only `identitetsbeteckning` (organisationsnummer/personnummer). Name-based resolution is not
      offered — earlier LLM-based name-to-orgnr resolution was removed because it relied on scraping Allabolag.se, which
      is prohibited by DEC-20260420-H.
    category: coverage
    severity: info
    workaround: >-
      Resolve the company name to an orgnr via an upstream name-resolver or via the VIES VAT validator, then pass the
      orgnr.
  - title: Enskild näringsidkare may return multiple entries
    text: >-
      Sole traders (enskild näringsidkare) can have multiple registered companies on the same personnummer. The executor
      returns the first entry. If a personnummer is passed, only the primary entry is surfaced.
    category: coverage
    severity: info
    workaround: Prefer aktiebolag organisationsnummer (10 digits starting 2–9) for unambiguous single-entry lookups.
  - title: Deregistered company data may be historical only
    text: >-
      Deregistered companies (avregistrerad) still return registry data, but the data reflects the state at
      deregistration. `is_active` is false and `deregistered_date` is populated.
    category: freshness
    severity: info
    workaround: Always check the `is_active` and `deregistered_date` fields before using returned data for live decisions.
