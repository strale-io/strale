slug: pep-check
name: PEP Check
description: >-
  Screens an individual against the Politically Exposed Persons (PEP) database via Dilisense.
  Coverage spans 230+ geopolitical territories aligned with EU C/2023/724 PEP function definitions
  and includes Relatives and Close Associates (RCAs). Returns audit-grade evidence: match results
  with classification, position history, jurisdictions, and named source attribution.
category: compliance
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Full name of person to screen
    date_of_birth:
      type: string
      format: date
      description: ISO date of birth (YYYY-MM-DD) for disambiguation, reduces false positives on common names (optional)
    birth_date:
      type: string
      format: date
      description: Alias for date_of_birth (optional)
    country:
      type: string
      description: ISO country code filter (optional)
output_schema:
  type: object
  example:
    query: Angela Merkel
    country_filter: DE
    birth_date_filter: "1954-07-17"
    is_pep: true
    match_count: 1
    total_results: 1
    matches:
      - name: Angela Dorothea Merkel
        entity_id: dilisense_pep
        classification: pep
        topics:
          - role.pep
        positions:
          - Chancellor of Germany
          - Member of the Bundestag
        countries:
          - DE
        datasets:
          - dilisense_pep
        last_updated_at: null
    lists_queried:
      collection: dilisense/consolidated-pep
      source_count: 230
      major_lists:
        - "EU C/2023/724 — Member-State PEP function definitions"
        - "DE Bundestag, Bundesrat, Bundespräsident, Bundesbank, state-owned enterprises"
        - "(plus 228+ national parliament/government/central-bank/judiciary sources)"
      freshness_note: "Dilisense PEP coverage spans 230+ geopolitical territories and aligns with EU C/2023/724 PEP function definitions. The publisher refreshes the index multiple times daily; per-list timestamps are not exposed via the screening API."
      source_catalog_url: "https://dilisense.com/en/sources/politically-exposed-persons-list"
      version: null
      last_updated_at: null
    source: dilisense
    screened_at: "2026-04-27T13:00:00.000Z"
  properties:
    query:
      type: string
    country_filter:
      type:
        - string
        - "null"
    birth_date_filter:
      type:
        - string
        - "null"
    is_pep:
      type: boolean
    match_count:
      type: integer
    total_results:
      type: integer
    matches:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          entity_id:
            type: string
          classification:
            type: string
            enum:
              - pep
          topics:
            type: array
          positions:
            type: array
          countries:
            type: array
          datasets:
            type: array
          last_updated_at:
            type:
              - string
              - "null"
    lists_queried:
      type: object
      properties:
        collection:
          type: string
        source_count:
          type: integer
        major_lists:
          type: array
        freshness_note:
          type: string
        source_catalog_url:
          type: string
        version:
          type:
            - string
            - "null"
        last_updated_at:
          type:
            - string
            - "null"
    source:
      type: string
      enum:
        - dilisense
    screened_at:
      type: string
data_source: Dilisense consolidated PEP database (230+ territories, EU C/2023/724-aligned, RCAs included; full attribution at https://dilisense.com/en/sources/politically-exposed-persons-list)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: commercial-stable-api
processes_personal_data: true
personal_data_categories:
  - name
  - date_of_birth
  - nationality
  - political_affiliation
geography: global
test_fixtures:
  known_answer:
    input:
      name: Angela Merkel
    expected_fields:
      - field: is_pep
        operator: not_null
        reliability: guaranteed
      - field: matches
        operator: not_null
        reliability: guaranteed
      - field: lists_queried
        operator: not_null
        reliability: guaranteed
      - field: query
        operator: not_null
        reliability: guaranteed
  health_check_input:
    name: Angela Merkel
output_field_reliability:
  query: guaranteed
  is_pep: guaranteed
  match_count: guaranteed
  total_results: guaranteed
  matches: guaranteed
  lists_queried: guaranteed
  source: guaranteed
  screened_at: guaranteed
  country_filter: common
  birth_date_filter: common
limitations:
  - title: National-PEP coverage is asserted by the publisher, not verified per call
    text: >-
      Dilisense aggregates national parliament, government, central-bank, judiciary, and state-owned-enterprise
      board sources for 230+ territories. Per-country source attribution is published at the source_catalog_url.
      For jurisdiction-critical screening, supplement with the national source directly.
    category: coverage
    severity: info
    workaround: For high-stakes screening, cross-reference with the national parliament or central-bank website.
  - title: Fuzzy name matching can produce false positives for common names
    text: Common names may produce false-positive matches. Provide date_of_birth for disambiguation.
    category: accuracy
    severity: warning
    workaround: Provide date_of_birth and an ISO country code.
  - title: Per-list version timestamps are not exposed by the upstream API
    text: >-
      Dilisense refreshes the consolidated PEP index multiple times daily, but the screening API does not return
      a per-list last_updated_at value per call. Output sets lists_queried.last_updated_at = null with a
      freshness_note attesting to the publisher's refresh cadence.
    category: freshness
    severity: info
