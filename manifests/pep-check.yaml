slug: pep-check
name: PEP Check
description: >-
  Screens an individual against the Politically Exposed Persons (PEP) database via OpenSanctions.
  Returns match results with position, jurisdiction, and confidence score.
category: compliance
price_cents: 15
is_free_tier: false
input_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Full name of person to screen
    date_of_birth:
      type: string
      description: Date of birth (YYYY-MM-DD) for disambiguation (optional)
    country:
      type: string
      description: Country code for narrowing results (optional)
output_schema:
  type: object
  properties:
    query:
      type: object
    is_pep:
      type: boolean
    pep_matches:
      type: array
    checked_sources:
      type: array
data_source: OpenSanctions API (opensanctions.org)
data_source_type: api
transparency_tag: mixed
freshness_category: live-fetch
maintenance_class: commercial-stable-api
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - name
  - date_of_birth
geography: global
test_fixtures:
  known_answer:
    input:
      name: "Angela Merkel"
    expected_fields:
      - field: is_pep
        operator: not_null
        reliability: guaranteed
      - field: pep_matches
        operator: not_null
        reliability: guaranteed
      - field: checked_sources
        operator: not_null
        reliability: guaranteed
      - field: query
        operator: not_null
        reliability: guaranteed
  health_check_input:
    name: "Angela Merkel"
output_field_reliability:
  query: guaranteed
  is_pep: guaranteed
  pep_matches: guaranteed
  checked_sources: guaranteed
limitations:
  - title: Coverage depends on OpenSanctions dataset
    text: Coverage depends on OpenSanctions dataset — may not include all national PEP lists
    category: coverage
    severity: info
  - title: Fuzzy name matching may produce false positives
    text: Name matching is fuzzy — common names may produce false positives. Date of birth strongly recommended for disambiguation.
    category: accuracy
    severity: warning
    workaround: Provide date_of_birth parameter for disambiguation
