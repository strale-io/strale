slug: pep-check
name: PEP Check
description: >-
  Screen a person against Politically Exposed Persons (PEP) databases. Returns match status,
  PEP type (national, international, family member, close associate), position held, country,
  and data source.
category: compliance
price_cents: 15
is_free_tier: false
input_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Full name of person to screen
    birth_date:
      type: string
      description: Date of birth (YYYY-MM-DD) for disambiguation (optional)
    country:
      type: string
      description: Country code for narrowing results (optional)
output_schema:
  type: object
  properties:
    query:
      type: string
    is_pep:
      type: boolean
    total_matches:
      type: integer
    matches:
      type: array
    screened_at:
      type: string
data_source: OpenSanctions API (opensanctions.org)
data_source_type: api
transparency_tag: external_api
freshness_category: live-fetch
test_fixtures:
  known_answer:
    input:
      name: "Angela Merkel"
    expected_fields:
      - field: is_pep
        operator: not_null
        reliability: guaranteed
      - field: total_matches
        operator: gt
        value: 0
        reliability: guaranteed
      - field: matches
        operator: not_null
        reliability: guaranteed
      - field: screened_at
        operator: not_null
        reliability: guaranteed
  health_check_input:
    name: "Angela Merkel"
output_field_reliability:
  query: guaranteed
  is_pep: guaranteed
  total_matches: guaranteed
  matches: guaranteed
  screened_at: guaranteed
  birth_date_filter: common
  country_filter: common
limitations:
  - title: Coverage depends on OpenSanctions dataset
    text: Coverage depends on OpenSanctions dataset — may not include all national PEP lists
    category: coverage
    severity: info
  - title: Fuzzy name matching may produce false positives
    text: Name matching is fuzzy — common names may produce false positives. Birth date strongly recommended for disambiguation.
    category: accuracy
    severity: warning
    workaround: Provide birth_date parameter for disambiguation
