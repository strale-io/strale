slug: belgian-company-data
name: Belgian Company Data
description: >-
  Look up Belgian company data from the KBO/BCE Crossroads Bank for Enterprises via the CBEAPI.be JSON wrapper. Accepts
  enterprise number (10 digits, e.g. 0404.616.494) or fuzzy company name. Returns name, status, type, address,
  registration date, NACE code, and derived BE VAT number.
category: company-data
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  required: []
  properties:
    enterprise_number:
      type: string
      description: KBO/BCE enterprise number (e.g. 0404.616.494)
    company_name:
      type: string
      description: Belgian company name (fuzzy match)
    task:
      type: string
      description: Free-text input — first matching enterprise number or name is used
output_schema:
  type: object
  example:
    company_name: ANHEUSER-BUSCH INBEV
    registration_number: 0417.497.106
    status: active
    business_type: Société anonyme
    address: Grand-Place 1 1000 Bruxelles BE
    registration_date: "1977-08-02"
    industry: null
    directors: []
    establishments_count: 5
    abbreviation: A.P.I.
    commercial_name: null
    vat_number: BE0417497106
  properties:
    company_name:
      type: string
    registration_number:
      type: string
    status:
      type: string
    business_type:
      type: string
    address:
      type: string
    registration_date:
      type: string
    industry:
      type: string
    directors:
      type: array
    establishments_count:
      type: integer
    abbreviation:
      type: string
    commercial_name:
      type: string
    vat_number:
      type: string
data_source: CBEAPI.be (vendor wrapper of KBO/BCE Crossroads Bank for Enterprises)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: free-stable-api
processes_personal_data: true
personal_data_categories:
  - name
  - address
  - professional
geography: eu
test_fixtures:
  known_answer:
    input:
      enterprise_number: "0417497106"
    expected_fields:
      - field: company_name
        operator: not_null
        reliability: guaranteed
      - field: registration_number
        operator: equals
        reliability: guaranteed
        value: 0417.497.106
      - field: status
        operator: equals
        reliability: guaranteed
        value: active
      - field: business_type
        operator: not_null
        reliability: guaranteed
      - field: address
        operator: not_null
        reliability: guaranteed
      - field: registration_date
        operator: equals
        reliability: guaranteed
        value: "1977-08-02"
      - field: directors
        operator: not_null
        reliability: guaranteed
      - field: establishments_count
        operator: not_null
        reliability: guaranteed
      - field: abbreviation
        operator: equals
        reliability: guaranteed
        value: A.P.I.
      - field: vat_number
        operator: equals
        reliability: guaranteed
        value: BE0417497106
  health_check_input:
    enterprise_number: "0417497106"
output_field_reliability:
  company_name: guaranteed
  registration_number: guaranteed
  status: guaranteed
  business_type: guaranteed
  address: common
  registration_date: common
  industry: rare
  directors: guaranteed
  establishments_count: guaranteed
  abbreviation: rare
  commercial_name: rare
  vat_number: guaranteed
limitations:
  - title: Sourced via the CBEAPI.be vendor wrapper, not directly from FPS Economy
    text: >-
      This capability uses CBEAPI.be, a free third-party JSON wrapper over the Belgian KBO/BCE register, rather than the
      official FPS Economy Open Data SFTP feed. The underlying records are public-register data, but a first-party
      ingest of the official KBO Open Data is the longer-term target.
    category: provenance
    severity: info
  - title: Daily refresh — sub-day filings may not be reflected immediately
    text: >-
      The KBO/BCE register is refreshed daily. Filings submitted today may not be reflected in the response until the
      next daily refresh.
    category: freshness
    severity: info
  - title: Personal data restrictions on direct marketing
    text: >-
      Personal-name data (e.g. for sole proprietorships) carried in this response may not be reused for direct marketing
      purposes per the Belgian KBO Open Data terms.
    category: legal
    severity: warning
