# NOTE — manifest-canonical metadata is intentionally stale relative to the
# multi-provider executor. The router at src/capabilities/vat-validate.ts
# now dispatches to VIES (EU27 + XI), HMRC (GB), Brønnøysundregistrene (NO),
# and the Swiss UID register (CH/LI), but the capability's name, description,
# input_schema, output_schema, data_source, and output_field_reliability
# below are kept matching the DB (single-provider VIES era) because the
# onboarding pipeline does not currently support updating manifest-canonical
# fields on existing capabilities.
#
# Per-call audit-trail provenance IS honest — each provider module records
# its own `provenance.source` so audit records reflect the actual upstream.
# Only the catalog-level metadata is temporarily stale.
#
# Tracked fix: Notion To-do "Multi-provider capabilities as first-class
# shape" (page 34f67c87-082c-8166-aaf6-dcaa53bfd8ec). When that ships, this
# manifest's metadata + the DB row will be updated together properly.

slug: vat-validate
name: EU VAT Validation + VIES Enrichment
description: >-
  Validate a European VAT number against the VIES database. Returns company name, address, and validity. Caches results
  for 24 hours for instant responses on repeated lookups. Serves cached data when VIES is down.
category: validation
price_cents: 10
is_free_tier: false
input_schema:
  type: object
  required:
    - vat_number
  properties:
    vat_number:
      type: string
      description: EU VAT number including country prefix (e.g. SE556703748501)
output_schema:
  type: object
  example:
    valid: true
    vat_number: SE556703748501
    company_name: Spotify AB
    country_code: SE
    request_date: 2026-04-03+02:00
    company_address: "REGERINGSGATAN 19 \n111 53 STOCKHOLM"
  properties:
    valid:
      type: boolean
    vat_number:
      type: string
    company_name:
      type: string
    country_code:
      type: string
    company_address:
      type: string
data_source: VIES (EU VAT Information Exchange System, European Commission)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: free-stable-api
processes_personal_data: false
geography: eu
test_fixtures:
  known_answer:
    input:
      vat_number: DE811128135
    expected_fields:
      - field: valid
        operator: is_true
        reliability: guaranteed
  health_check_input:
    vat_number: SE556703748501
output_field_reliability:
  valid: guaranteed
  vat_number: guaranteed
  company_name: guaranteed
  country_code: guaranteed
  company_address: guaranteed
limitations:
  - title: VIES has periodic outages and an undocumented per-member-state concurrency limit
    text: >-
      VIES (EU VAT validation service) experiences periodic outages and throttles requests per member state with limits
      that are not publicly disclosed. Strale retries on transient SOAP faults; the 48h substrate cache plus stale-fallback
      keeps responses available when VIES is down.
    category: availability
    severity: warning
    workaround: Same-VAT lookups within 48h are served from cache. On VIES outage with no cache, the call fails with a
      structured error.
  - title: VAT registration status may lag national registry changes by up to 48h
    text: >-
      Strale's substrate cache is 48h. National registries themselves typically lag VIES by a further 24h. For same-day
      verification (especially deregistration), bypass the cache by querying the national authority directly.
    category: freshness
    severity: info
    workaround: For real-time same-day verification, contact the national tax authority directly.
  - title: Swiss UID public-tier VAT lookup is boolean only
    text: >-
      The free Swiss UID register endpoint returns valid/invalid only — no company name or address. Full enrichment for
      Swiss entities requires a separate UID register call (counted against a tight 20 req/min public-tier limit) which
      Strale does not call from this capability today.
    category: coverage
    severity: info
    workaround: For Swiss company name + address, call the swiss-company-data capability.
  - title: UK VAT validation requires HMRC credentials to be configured
    text: >-
      The HMRC Check a UK VAT Number API v2 is registration-gated and uses OAuth2. Until production credentials land,
      GB VAT numbers return a structured "credentials pending" error.
    category: availability
    severity: info
    workaround: Use vat-format-validate for GB structural validation while HMRC credentials are pending.
