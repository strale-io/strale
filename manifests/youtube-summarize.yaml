slug: youtube-summarize
name: YouTube Summarize
description: >-
  Summarize a YouTube video from its auto-generated transcript. Returns summary,
  key points, topics, timestamps of interest, and sentiment classification.
category: data-extraction
price_cents: 20
is_free_tier: false
maintenance_class: scraping-fragile-target
input_schema:
  type: object
  required:
    - url
  properties:
    url:
      type: string
      description: YouTube video URL or video ID
output_schema:
  type: object
  properties:
    title:
      type: string
    channel:
      type: string
    summary:
      type: string
    key_points:
      type: array
    topics:
      type: array
    timestamps_of_interest:
      type: array
    sentiment:
      type: string
    recommended_for:
      type: string
    video_id:
      type: string
    video_url:
      type: string
    transcript_length:
      type: number
data_source: YouTube transcript API + Claude Haiku (summarization)
data_source_type: scrape
transparency_tag: ai_generated
freshness_category: live-fetch
test_fixtures:
  known_answer:
    input:
      url: https://www.youtube.com/watch?v=dQw4w9WgXcQ
    expected_fields:
      - field: title
        operator: not_null
        reliability: guaranteed
      - field: summary
        operator: not_null
        reliability: guaranteed
      - field: key_points
        operator: not_null
        reliability: guaranteed
      - field: topics
        operator: not_null
        reliability: guaranteed
      - field: video_id
        operator: equals
        value: dQw4w9WgXcQ
        reliability: guaranteed
      - field: video_url
        operator: not_null
        reliability: guaranteed
      - field: transcript_length
        operator: gt
        value: 0
        reliability: guaranteed
  health_check_input:
    url: https://www.youtube.com/watch?v=dQw4w9WgXcQ
output_field_reliability:
  title: guaranteed
  channel: common
  summary: guaranteed
  key_points: guaranteed
  topics: guaranteed
  timestamps_of_interest: common
  sentiment: common
  recommended_for: common
  video_id: guaranteed
  video_url: guaranteed
  transcript_length: guaranteed
limitations:
  - title: Requires video with available captions
    text: >-
      Videos without auto-generated or manual captions cannot be summarized.
      Most popular English-language videos have auto-captions.
    category: coverage
    severity: info
  - title: YouTube page structure may change
    text: >-
      Transcript extraction relies on parsing YouTube's page HTML for caption
      track URLs. Changes to YouTube's frontend may break extraction.
    category: dependency
    severity: warning
  - title: AI-generated summary
    text: >-
      Summary, key points, and sentiment are generated by Claude Haiku and
      may not perfectly represent the video content.
    category: accuracy
    severity: info
