output_field_reliability:
  query: guaranteed
  risk_level: guaranteed
  risk_level_thresholds: guaranteed
  total_hits: guaranteed
  categories: guaranteed
  categories_found: guaranteed
  severe_categories: guaranteed
  top_articles: guaranteed
  lists_queried: guaranteed
  source: guaranteed
  screened_at: guaranteed
  period: guaranteed
  fallback_reason: rare
limitations:
  - title: Adverse-media language coverage on Dilisense path is not publicly documented per language
    text: >-
      Dilisense aggregates 235k+ sources globally but does not publish a per-language source breakdown.
      Marketing materials name English, French, and German explicitly; native-language coverage for other
      EU27 + UK + NO + CH languages (Polish, Italian, Spanish, Dutch, Swedish, etc.) is not verified
      from public docs. For non-DE/FR/EN counterparties, treat results as a floor, not a ceiling.
    category: coverage
    severity: warning
    workaround: For high-stakes screening of a non-DE/FR/EN payee, supplement with a native-language source check or accept residual risk explicitly.
  - title: Risk-level rule is heuristic, not regulatory
    text: >-
      The risk_level field is computed from total hits and severe-category counts (see risk_level_thresholds in
      output). It is a defensible heuristic, not a regulatory definition. A "high" output means dense severe-category
      coverage in the last 12 months — interpretation requires human review of the underlying articles.
    category: accuracy
    severity: warning
    workaround: Always review top_articles for context before deciding to block a payment or onboard a counterparty.
  - title: Fallback path uses Google index and keyword classification, not Dilisense data
    text: >-
      When Dilisense is unavailable (quota exhausted, 5xx, or no API key), the fallback uses Serper.dev
      (Google search) with hardcoded keyword-based categorization. Output sets source="serper" and includes
      fallback_reason. Coverage breadth and category accuracy are materially lower on the fallback path.
    category: coverage
    severity: info
    workaround: Treat serper-sourced calls as adequate but lower-evidence for audit purposes.
  - title: Recency window is fixed at last 12 months
    text: Both paths filter to the last 12 months of articles. Older adverse coverage is not surfaced.
    category: freshness
    severity: info
  - title: Entity name must match the corporate filing form, not consumer brand or descriptor
    text: >-
      Dilisense indexes coverage against the corporate filing name. Querying with a consumer brand
      name or a country-descriptor suffix (e.g. "Folli Follie" misses; "FF Group" returns 12 hits.
      "Danske Bank Estonia" misses; "Danske Bank" returns 11k+ hits including Estonian-branch
      laundering coverage). For parent-branch entities, query the parent name. For
      brand-vs-corporate, use the corporate filing name. We do NOT auto-rewrite the query
      — audit trail must reflect what was actually asked.
    category: accuracy
    severity: warning
    workaround: When total_hits=0 for a major entity, retry with the parent corporate name (drop country suffixes; drop consumer brand names in favour of the registered corporate name).
  - title: Coverage gap for some major regional bank failures
    text: >-
      Empirically confirmed gap (2026-04-29 variant test): "Banca Popolare di Vicenza" — a major
      2017 Italian bank failure — returns zero adverse-media hits across all reasonable name
      variants (BPVi, Banca Popolare di Vicenza Scpa, Popolare di Vicenza). Dilisense's index
      depth is uneven by country; Italian non-headline banking coverage appears materially weaker
      than UK/DE/FR/EN equivalents.
    category: coverage
    severity: warning
    workaround: For high-stakes Italian banking-counterparty screening, supplement with a native-source check.
