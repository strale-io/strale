slug: adverse-media-check
name: Adverse Media Check
description: >-
  Screens a person or company for adverse news coverage across 235,000+ sources via Dilisense
  (primary) with Serper Google search fallback. Returns audit-grade evidence: risk level with
  documented thresholds, FATF-aligned category counts, top article headlines with source URLs and
  dates, and the rule used to classify severe vs non-severe coverage.
category: compliance
price_cents: 20
is_free_tier: false
input_schema:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Person or company name to screen
    entity_name:
      type: string
      description: Alias for name (optional)
    country:
      type: string
      description: Additional context like industry or country (optional)
    entity_type:
      type: string
      enum:
        - person
        - company
      description: Override auto-detection of entity type (optional)
output_schema:
  type: object
  example:
    query: Wirecard AG
    risk_level: high
    risk_level_thresholds:
      none: "total_hits == 0"
      low: "total_hits > 0 AND no hits in severe categories (financial_crime, organized_crime, terrorism, violent_crime)"
      medium: "1+ hits in any severe category"
      high: "10+ hits in any single severe category"
    total_hits: 312
    categories:
      financial_crime: 187
      regulatory: 94
      organized_crime: 12
      political: 19
    categories_found:
      - financial_crime
      - regulatory
      - organized_crime
      - political
    severe_categories:
      - financial_crime
      - organized_crime
      - terrorism
      - violent_crime
    top_articles:
      - headline: "Wirecard scandal: how the German fintech collapsed"
        source_link: "https://example.com/wirecard-scandal"
        timestamp: "2026-04-20T10:00:00"
        language: "en"
        category: "financial_crime"
    lists_queried:
      collection: "dilisense/adverse-media"
      source_count: 235000
      version: null
      last_updated_at: null
    screened_at: "2026-04-27T13:00:00.000Z"
    period: "last 12 months"
    source: "dilisense"
  properties:
    query:
      type: string
    risk_level:
      type: string
      enum:
        - none
        - low
        - medium
        - high
    risk_level_thresholds:
      type: object
    total_hits:
      type: integer
    categories:
      type: object
    categories_found:
      type: array
    severe_categories:
      type: array
    top_articles:
      type: array
      items:
        type: object
        properties:
          headline:
            type: string
          source_link:
            type: string
          timestamp:
            type: string
          language:
            type: string
          category:
            type: string
    lists_queried:
      type: object
      properties:
        collection:
          type: string
        source_count:
          type:
            - integer
            - "null"
        version:
          type:
            - string
            - "null"
        last_updated_at:
          type:
            - string
            - "null"
    screened_at:
      type: string
    period:
      type: string
    source:
      type: string
      enum:
        - dilisense
        - serper
    fallback_reason:
      type:
        - string
        - "null"
data_source: Dilisense Adverse Media (235k+ news sources, FATF-categorized) primary; Serper.dev (Google search) fallback
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: commercial-stable-api
processes_personal_data: true
personal_data_categories:
  - name
# Bucket C — Art. 22 classification. Returns adverse-news findings the
# controller uses to apply enhanced due diligence; the controller's
# pipeline turns the signal into a decision. Audit body's gdpr block
# carries the disclosure + dispute endpoint URL.
gdpr_art_22_classification: screening_signal
geography: global
test_fixtures:
  known_answer:
    input:
      name: Wirecard AG
      entity_type: company
    expected_fields:
      - field: risk_level
        operator: not_null
        reliability: guaranteed
      - field: total_hits
        operator: not_null
        reliability: guaranteed
      - field: categories
        operator: not_null
        reliability: guaranteed
      - field: lists_queried
        operator: not_null
        reliability: guaranteed
      - field: source
        operator: not_null
