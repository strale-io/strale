slug: adverse-media-check
name: Adverse Media Check
description: >-
  Searches public news sources for adverse media about a company or individual, with AI-powered risk
  assessment. Returns risk level, categorized findings, and sources.
category: compliance
price_cents: 20
is_free_tier: false
input_schema:
  type: object
  required:
    - entity_name
  properties:
    entity_name:
      type: string
      description: Person or company name to screen
    country:
      type: string
      description: Country to narrow search results (optional)
output_schema:
  type: object
  properties:
    query:
      type: object
    risk_detected:
      type: boolean
    risk_level:
      type: string
    findings:
      type: array
    searches_performed:
      type: array
    disclaimer:
      type: string
data_source: Google (Serper.dev) + Claude Haiku classification
data_source_type: api
transparency_tag: ai_generated
freshness_category: live-fetch
maintenance_class: commercial-stable-api
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - name
test_fixtures:
  known_answer:
    input:
      entity_name: "Wirecard AG"
    expected_fields:
      - field: risk_detected
        operator: not_null
        reliability: guaranteed
      - field: risk_level
        operator: not_null
        reliability: guaranteed
      - field: findings
        operator: not_null
        reliability: guaranteed
      - field: searches_performed
        operator: not_null
        reliability: guaranteed
      - field: disclaimer
        operator: not_null
        reliability: guaranteed
      - field: query
        operator: not_null
        reliability: guaranteed
  health_check_input:
    entity_name: "Wirecard AG"
output_field_reliability:
  query: guaranteed
  risk_detected: guaranteed
  risk_level: guaranteed
  findings: guaranteed
  searches_performed: guaranteed
  disclaimer: guaranteed
limitations:
  - title: AI-classified results may miss subtle risk signals
    text: AI-classified results — may miss subtle risk signals or produce false positives
    category: accuracy
    severity: warning
  - title: Limited to publicly indexed web content
    text: Limited to publicly indexed web content — paywalled news sources not covered
    category: coverage
    severity: info
  - title: English-language bias
    text: English-language bias — non-English media coverage may be underrepresented
    category: coverage
    severity: info
  - title: Recency depends on search index freshness
    text: Recency depends on search index freshness (typically 24-48h delay)
    category: freshness
    severity: info
