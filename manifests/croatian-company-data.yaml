slug: croatian-company-data
name: Croatian Company Data
description: >-
  Look up Croatian company data from the Sudski registar (Ministry of Justice Court Register). Accepts OIB (11 digits)
  or MBS (court registry number). Returns company name, status, address, legal form, VAT.
category: data-extraction
price_cents: 80
is_free_tier: false
avg_latency_ms: 500
input_schema:
  type: object
  required:
    - oib
  properties:
    oib:
      type: string
      description: Croatian OIB (11 digits) or MBS (court registry number)
output_schema:
  type: object
  example:
    oib: "81793146560"
    mbs: "80266256"
    mb: "1414887"
    potpuni_mbs: "080266256"
    status: active
    status_code: 1
    address: Radnička cesta 21, Zagreb, HR
    company_name: Hrvatski Telekom d.d.
    short_name: HT d.d.
    legal_form: dioničko društvo
    legal_form_abbr: d.d.
    main_activity_code: "6110"
    email: ir@t.ht.hr
    country_code: HR
    registered_date: "1999-01-27"
    vat_number: HR81793146560
  properties:
    oib:
      type: string
    mbs:
      type: string
    status:
      type: string
    address:
      type: string
    company_name:
      type: string
    legal_form:
      type: string
    vat_number:
      type: string
data_source: Sudski registar REST API — Ministarstvo pravosuđa i uprave (Croatian Court Register)
