limitations:
  - title: Board members and ownership require paid extract from Sudski registar
    text: >-
      Public OAuth2 API returns entity profile, addresses, legal form, activity codes, and registered capital, but does
      not expose board members (uprava) or shareholders. Board composition and beneficial ownership require the paid
      certified extract (izvadak) from the court registry.
    category: coverage
    severity: info
    workaround: Use the MBS/OIB to order a certified extract from sudreg.pravosudje.hr
  - title: Lookup requires OIB or MBS (no name search)
    text: >-
      The capability dispatches on OIB (11 digits) or MBS (numeric court registry number). Name-based search is not
      offered because the upstream /subjekti endpoint is a case-sensitive SQL LIKE match — unsuitable for production
      fuzzy lookup.
    category: coverage
    severity: info
    workaround: Resolve the company to an OIB via an upstream name-resolver, then pass the OIB.
