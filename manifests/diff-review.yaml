slug: diff-review
name: Diff Review
description: >-
  Analyze a unified diff (git diff output) for bugs, security issues, missing error handling, test gaps, and code
  quality. Returns structured findings with severity, file paths, and an approval recommendation. Built for CI/CD
  pre-merge checks.
category: developer-tools
price_cents: 10
is_free_tier: false
maintenance_class: commercial-stable-api
input_schema:
  type: object
  required:
    - diff
  properties:
    diff:
      type: string
      description: Unified diff text (output of `git diff`)
    context:
      type: string
      description: Optional project context (e.g. "TypeScript API server using Hono")
    focus:
      type: string
      description: Optional focus area (bugs, security, performance, test-gaps, or all)
output_schema:
  type: object
  properties:
    summary:
      type: string
    risk_level:
      type: string
    issues:
      type: array
    missing_tests:
      type: array
    hardcoded_values:
      type: array
    todos_added:
      type: array
    approval_recommendation:
      type: string
    approval_reason:
      type: string
    diff_stats:
      type: object
data_source: Claude Haiku (diff analysis)
data_source_type: api
transparency_tag: ai_generated
freshness_category: computed
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: false
geography: global
test_fixtures:
  known_answer:
    input:
      diff: |
        diff --git a/README.md b/README.md
        --- a/README.md
        +++ b/README.md
        @@ -1 +1,2 @@
         # Project
        +Added docs.
    expected_fields:
      - field: summary
        operator: not_null
        reliability: guaranteed
      - field: risk_level
        operator: not_null
        reliability: guaranteed
      - field: issues
        operator: not_null
        reliability: guaranteed
      - field: missing_tests
        operator: not_null
        reliability: guaranteed
      - field: hardcoded_values
        operator: not_null
        reliability: guaranteed
      - field: todos_added
        operator: not_null
        reliability: guaranteed
      - field: approval_recommendation
        operator: not_null
        reliability: guaranteed
      - field: approval_reason
        operator: not_null
        reliability: guaranteed
      - field: diff_stats
        operator: not_null
        reliability: guaranteed
  health_check_input:
    diff: |
      diff --git a/README.md b/README.md
      --- a/README.md
      +++ b/README.md
      @@ -1 +1,2 @@
       # Project
      +Added docs.
output_field_reliability:
  summary: guaranteed
  risk_level: guaranteed
  issues: guaranteed
  missing_tests: guaranteed
  hardcoded_values: guaranteed
  todos_added: guaranteed
  approval_recommendation: guaranteed
  approval_reason: guaranteed
  diff_stats: guaranteed
limitations:
  - title: Diff size limited to ~12,000 characters
    text: >-
      Large diffs are truncated to fit the LLM context window. For very large PRs, split into per-file diffs and call
      separately.
    category: coverage
    severity: info
  - title: AI-generated analysis
    text: >-
      Findings are generated by Claude Haiku and may include false positives or miss subtle issues that require deep
      project context.
    category: accuracy
    severity: info
