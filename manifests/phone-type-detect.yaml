slug: phone-type-detect
name: Phone Type Detect
description: >-
  Detect whether a phone number is mobile, landline, VOIP, toll-free, or premium rate. Essential for SMS delivery
  verification and communication routing.
category: validation
price_cents: 2
is_free_tier: false
input_schema:
  type: object
  required:
    - phone_number
  properties:
    phone_number:
      type: string
      description: Phone number in any format
    country_code:
      type: string
      description: ISO 2-letter country code hint (optional)
output_schema:
  type: object
  properties:
    phone_type:
      type: string
    is_mobile:
      type: boolean
    is_landline:
      type: boolean
    is_voip:
      type: boolean
    sms_capable:
      type: boolean
    country_code:
      type: string
data_source: libphonenumber-js (Google libphonenumber port)
data_source_type: computed
transparency_tag: algorithmic
freshness_category: computed
maintenance_class: pure-computation
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - phone
geography: global
test_fixtures:
  known_answer:
    input:
      phone_number: "+46701234567"
    expected_fields:
      - field: input
        operator: equals
        reliability: guaranteed
        value: "+46701234567"
      - field: phone_type
        operator: equals
        reliability: guaranteed
        value: unknown
      - field: is_mobile
        operator: equals
        reliability: guaranteed
        value: false
      - field: is_landline
        operator: equals
        reliability: guaranteed
        value: false
      - field: is_voip
        operator: equals
        reliability: guaranteed
        value: false
      - field: sms_capable
        operator: equals
        reliability: guaranteed
        value: false
      - field: is_toll_free
        operator: equals
        reliability: guaranteed
        value: false
      - field: is_premium
        operator: equals
        reliability: guaranteed
        value: false
      - field: country_code
        operator: equals
        reliability: guaranteed
        value: SE
  health_check_input:
    phone_number: "+46701234567"
output_field_reliability:
  phone_type: guaranteed
  is_mobile: guaranteed
  is_landline: guaranteed
  is_voip: guaranteed
  sms_capable: guaranteed
  is_toll_free: guaranteed
  is_premium: guaranteed
  country_code: guaranteed
  input: guaranteed
limitations:
  - title: Type detection depends on number range allocation
    text: Phone type is determined by number range allocation data — ported numbers may show the original type
    category: accuracy
    severity: info
