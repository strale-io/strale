limitations:
  - title: Daily snapshot — sub-day filings may not be reflected immediately
    text: >-
      The Latvian Open Data Portal publishes a daily snapshot. Filings submitted today may not be reflected in the API
      response until the next daily refresh.
    category: freshness
    severity: info
  - title: Open data covers core register only — beneficial owners and financials require separate datasets
    text: >-
      This capability returns the structured register record only. Beneficial owners (Patiesie labuma guvēji) and
      financial statements (Gada pārskatu finanšu dati) are published as separate data.gov.lv datasets and are not
      included in this response.
    category: coverage
    severity: info
  - title: SEPA creditor ID and postal index are not present for all entities
    text: >-
      The SEPA creditor identifier and postal index fields are populated for most actively registered legal entities but
      may be missing for older or terminated records.
    category: coverage
    severity: info
