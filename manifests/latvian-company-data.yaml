slug: latvian-company-data
name: Latvian Company Data
description: >-
  Look up Latvian company data from the Enterprise Register (Uzņēmumu reģistrs) via the data.gov.lv open-data CKAN API.
  Accepts registration number (11 digits) or fuzzy company name. Returns name, status, type, address, registration date,
  SEPA creditor ID, and ATVK administrative code.
category: company-data
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  required: []
  properties:
    reg_number:
      type: string
      description: Latvian registration number (11 digits)
    company_name:
      type: string
      description: Latvian company name (fuzzy match)
    task:
      type: string
      description: Free-text input — first matching registration number or company name is used
output_schema:
  type: object
  example:
    company_name: Air Baltic Corporation AS
    reg_number: "40003245752"
    company_type: Akciju sabiedrība
    company_type_code: AS
    register_type: Komercreģistrs
    status: Reģistrēts
    address: Mārupes nov., Mārupes pag., Lidosta "Rīga", Tehnikas iela 3
    postal_index: "1053"
    registration_date: "1995-02-08"
    termination_date: null
    sepa_creditor_id: LV78ZZZ40003245752
    atvk_code: "807600"
    jurisdiction: LV
  properties:
    vat_number:
      type:
        - string
        - "null"
    company_name:
      type: string
    reg_number:
      type: string
    company_type:
      type: string
    company_type_code:
      type: string
    register_type:
      type: string
    status:
      type: string
    address:
      type: string
    postal_index:
      type: string
    registration_date:
      type: string
    termination_date:
      type: string
    sepa_creditor_id:
      type: string
    atvk_code:
      type: string
    jurisdiction:
      type: string
data_source: Latvian Open Data Portal (data.gov.lv) — Uzņēmumu reģistra atvērtie dati CKAN datastore_search API
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: free-stable-api
processes_personal_data: true
personal_data_categories:
