slug: au-company-data
name: Australian Company Data (ABR)
description: >-
  Look up Australian company data from the Australian Business Register (ABR). Accepts an ABN (11 digits). Returns
  entity name, status, type, GST registration, and address details. Free government API — fast and reliable.
category: company-data
price_cents: 5
is_free_tier: false
input_schema:
  type: object
  required:
    - abn
  properties:
    abn:
      type: string
      description: Australian Business Number (11 digits)
output_schema:
  type: object
  example:
    abn: "51824753556"
    acn: null
    state: NSW
    status: Active
    postcode: "2640"
    company_name: AUSTRALIAN TAXATION OFFICE
    entity_type: Commonwealth Government Entity
    gst_registered: true
    business_names: null
    last_updated: "1999-11-01"
    data_source: Australian Business Register (ABR)
    data_source_url: https://abr.business.gov.au/
    retrieved_at: "2026-03-20T10:00:00.000Z"
  properties:
    abn:
      type: string
    acn:
      type: string
    state:
      type: string
    status:
      type: string
    postcode:
      type: string
    company_name:
      type: string
    entity_type:
      type: string
    gst_registered:
      type: boolean
    business_names:
      type: array
      items:
        type: string
    last_updated:
      type: string
    data_source:
      type: string
    data_source_url:
      type: string
    retrieved_at:
      type: string
data_source: Australian Business Register (ABR)
data_source_type: api
transparency_tag: algorithmic
freshness_category: live-fetch
maintenance_class: free-stable-api
# SA.2b: per-capability PII classification (F-A-003, F-A-009)
processes_personal_data: true
personal_data_categories:
  - name
  - address
  - professional
geography: au
test_fixtures:
  known_answer:
    input:
      abn: "51824753556"
    expected_fields:
      - field: company_name
        operator: not_null
        reliability: guaranteed
      - field: abn
        operator: equals
        reliability: guaranteed
        value: "51824753556"
      - field: status
        operator: equals
        reliability: guaranteed
        value: Active
      - field: entity_type
        operator: not_null
        reliability: guaranteed
      - field: state
        operator: equals
        reliability: guaranteed
        value: NSW
      - field: postcode
        operator: equals
        reliability: guaranteed
        value: "2640"
      - field: gst_registered
        operator: equals
        reliability: guaranteed
        value: true
      - field: last_updated
        operator: equals
        reliability: guaranteed
        value: "1999-11-01"
      - field: data_source
        operator: not_null
        reliability: guaranteed
      - field: data_source_url
        operator: equals
        reliability: guaranteed
        value: https://abr.business.gov.au/
      - field: retrieved_at
        operator: not_null
        reliability: guaranteed
  health_check_input:
    abn: "51824753556"
output_field_reliability:
  company_name: guaranteed
  abn: guaranteed
  acn: common
  status: guaranteed
  entity_type: guaranteed
  state: common
  postcode: common
  gst_registered: common
  business_names: rare
  last_updated: guaranteed
  data_source: guaranteed
  data_source_url: guaranteed
  retrieved_at: guaranteed
limitations:
  - title: ABN only lookup
    text: >-
      This capability looks up entities by ABN only. It does not support search by company name, ACN, or other
      identifiers.
    category: coverage
    severity: info
  - title: Physical address limited to state and postcode
    text: The ABR API only returns state and postcode for the main business address, not full street address.
    category: accuracy
    severity: info
  - title: Historical data not included by default
    text: The lookup returns current entity status. Historical name changes and status changes are not included.
    category: coverage
    severity: info
