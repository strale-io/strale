[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pydantic-ai-strale"
version = "0.1.1"
description = "DEPRECATED — yanked 2026-04-22. Use the Strale MCP server (https://api.strale.io/mcp) or pip install straleio."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Strale", email = "hello@strale.io" }]
keywords = [
    "pydantic-ai", "strale", "ai", "agent", "tools", "capabilities",
    "iban", "vat", "compliance", "eu", "mcp", "business-data",
    "sanctions", "company-data", "kyb", "aml",
]
classifiers = [
    "Development Status :: 7 - Inactive",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "pydantic>=2.0.0",
    "requests>=2.28.0",
]

[project.urls]
Homepage = "https://strale.dev"
Repository = "https://github.com/strale-io/strale"
Documentation = "https://strale.dev/docs"

[tool.setuptools.packages.find]
include = ["pydantic_ai_strale*"]
