name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Required by apps/api/src/lib/audit-token.ts (F-0-001). Not secret —
      # just a 32+ char placeholder so the module-load assertion passes
      # under test. Production secret is set in Railway (Phase A Q1).
      AUDIT_HMAC_SECRET: ci-placeholder-secret-at-least-32-chars-long-0123456789
      # Required by apps/api/src/routes/wallet.ts for Stripe top-up redirect
      # URLs. Any HTTPS string works for test — the real value lives on
      # Railway. Without this, any test that imports app.ts (i.e. every
      # request-level test) fails at module load.
      FRONTEND_URL: https://strale.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # apps/api imports from `strale-mcp/tools`, which resolves to
      # packages/mcp-server/dist/tools.js(+.d.ts). The Dockerfile builds
      # the MCP server before the API for exactly this reason; CI must
      # do the same or typecheck can't find the module. See the seed CI
      # in #9 + the Phase B+C merge in #8.
      - run: npm --workspace=packages/mcp-server run build
      - run: npm run typecheck
      - run: npm --workspace=apps/api run lint:no-bare-catch
      # The SSRF inventory guard hardcodes its walk root relative to the
      # repo root (`apps/api/src/capabilities`); invoking it via the
      # workspace wrapper sets cwd to `apps/api/` and ENOENTs. Call it
      # directly from the repo root (GitHub Actions default cwd) instead.
      # The sibling `lint:no-bare-catch` script accepts its walk root as
      # argv ("src"), so the workspace wrapper still works for that one.
      - run: node apps/api/scripts/check-ssrf-inventory.mjs
      # F-0-014 guard: no new `console.*` calls. Script is cwd-independent
      # (resolves paths from import.meta.url), so the workspace wrapper works.
      - run: npm --workspace=apps/api run lint:no-new-console
      # SCF-3 guard: no API code access to transactions.integrity_hash_status
      # (owned by an untracked external workflow — see schema.ts comment).
      - run: node apps/api/scripts/check-no-external-column-access.mjs
      # DEC-20260422-A: every framework-named *-strale package must contain
      # at least one real import from the framework it claims to integrate
      # with. Blocks the "hollow package" class of incident that surfaced
      # with pydantic-ai on 2026-04-21. See CONTAINMENT_REPORT.md.
      - run: node apps/api/scripts/check-framework-packages.mjs
      - run: npm test
