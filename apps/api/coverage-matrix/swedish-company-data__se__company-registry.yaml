provider_tos_notes: >-
  VERIFIED 2026-04-22. Commercial use and redistribution permitted. The HVD API is part of
  Bolagsverket's värdefulla datamängder released 2025-02-03 under EU Commission Implementing
  Regulation (EU) 2023/138 and the Swedish Öppna datalagen. Bolagsverket states explicitly: (a)
  avgiftsfritt — no fees; (b) inget avtal — no contract required; (c) 'Du får använda dessa data
  fritt för kommersiella och icke-kommersiella syften, exempelvis för att skapa nya tjänster eller
  produkter'; (d) modification, processing, and combination with other sources allowed. Legal basis
  requires HVD datasets to be licensed under CC0 or CC BY 4.0 (or equivalent less restrictive).
  Attribution to Bolagsverket as source likely required — must be confirmed against the specific
  license tag in their dataset metadata, but CC BY 4.0 is the default assumption. Rate limit: 60
  requests/minute per client. Embed-and-bill: permitted by construction — HVD mandate explicitly
  allows building commercial services and products on top of the data, which covers Strale's
  embed-of-match-result model. Constraints to respect: GDPR/personuppgifter (no issue for corporate
  registry data), sekretess (not applicable to public registry fields), attribution requirement (add
  'Källa: Bolagsverket' to provenance metadata).
